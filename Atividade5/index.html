<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Pesquisa de Opinião - Filme</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1> Pesquisa de Opinião</h1>
    <p>Informe os dados dos participantes após a sessão do filme.</p>

    <form id="formPesquisa">
      <label for="idade">Idade:</label>
      <input type="number" id="idade" min="1" required>

      <label for="sexo">Sexo:</label>
      <select id="sexo" required>
        <option value="">Selecione</option>
        <option value="masculino">Masculino</option>
        <option value="feminino">Feminino</option>
        <option value="outros">Outros</option>
      </select>

      <label for="opiniao">Opinião:</label>
      <select id="opiniao" required>
        <option value="">Selecione</option>
        <option value="4">Ótimo</option>
        <option value="3">Bom</option>
        <option value="2">Regular</option>
        <option value="1">Péssimo</option>
      </select>

      <button type="submit">Adicionar Resposta</button>
    </form>

    <div class="contador">
      <p>Respostas registradas: <span id="contador">0</span> / 45</p>
    </div>

    <button id="btnResultado" onclick="calcularResultados()">Calcular Resultados</button>

    <div id="resultado" class="resultado"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
